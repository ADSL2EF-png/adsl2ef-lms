<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADSL-2EF — Hors ligne</title>
  <style>
    :root {
      --primary: #1747a6;
      --accent: #e0a126;
      --text: #15233d;
      --muted: #63718d;
      --bg: #f4f7fb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Manrope", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: #fff;
      border: 1px solid #d8e2f2;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 2.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: .75rem;
    }
    p {
      color: var(--muted);
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: .75rem 1.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .tip {
      margin-top: 2.5rem;
      font-size: .85rem;
      color: var(--muted);
      max-width: 340px;
      line-height: 1.5;
    }
    .tip strong { color: var(--accent); }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cf3f4d;
      margin-right: 6px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Vous êtes hors ligne</h1>
  <p>
    La connexion internet n'est pas disponible.<br>
    Vos données enregistrées restent accessibles localement.
  </p>
  <button class="btn" onclick="window.location.reload()">
    Réessayer la connexion
  </button>
  <p class="tip">
    <span class="status-dot"></span>
    <strong>Conseil :</strong> Vos cours, quiz et ressources déjà consultés
    sont disponibles en mode hors ligne. Reconnectez-vous pour synchroniser
    votre progression.
  </p>

  <script>
    // Recharger automatiquement quand la connexion revient
    window.addEventListener("online", function () {
      window.location.reload();
    });
  </script>
</body>
</html>
